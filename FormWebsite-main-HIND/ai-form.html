<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generated Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Dynamic Form Generator</h1>
        <div id="captchaContainer">
            <canvas id="captchaCanvas" width="200" height="70"></canvas>
            <button id="refreshCaptcha">↻ Refresh</button>
            <input type="text" id="captchaInput" placeholder="Enter the code above">
            <button id="verifyCaptcha">Verify</button>
            <p id="captchaMessage"></p>
        </div>
        <div id="formGeneratorContainer" style="display: none;">
            <button id="fetchFormButton">Generate Form</button>
            <div id="formContainer">
                <input type="text" id="userQuery" placeholder="Enter form Title....">
            </div>
        </div>
        <a href="index.html" class="button back-button">Back to Home</a>
        <div id="shareLinkContainer" style="margin-top: 20px;"></div>
    </div>
    <script src="Cont.js"></script>
</body>
</html>
